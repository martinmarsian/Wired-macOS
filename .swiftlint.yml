# .swiftlint.yml — Wired-macOS
# Based on the shared WiredSwift ruleset, with repo-specific exclusions.

excluded:
  - Sources/SocketSwift
  - Sources/CLZ4
  - Sources/CZlib
  - Sources/SQLite3
  - Vendor
  - .build
  - wiredsyncd/.build
  - wiredsyncd/.swiftpm
  - Tests
  - wiredsyncd/Tests
  - Wired 3Tests
  - Wired 3UITests
  - Package.swift

opt_in_rules:
  - closure_spacing
  - contains_over_first_not_nil
  - empty_count
  - empty_string
  - first_where
  - sorted_first_last
  - array_init

disabled_rules:
  - todo
  - blanket_disable_command

line_length:
  warning: 160
  error: 200
  ignores_comments: true
  ignores_urls: true

identifier_name:
  min_length:
    warning: 1
    error: 1
  allowed_symbols: ["_"]
  validates_start_with_lowercase: warning
  excluded:
    - db
    - t
    - c

type_body_length:
  warning: 350
  error: 600

file_length:
  warning: 500
  error: 1200
  ignore_comment_only_lines: true

function_body_length:
  warning: 80
  error: 200

cyclomatic_complexity:
  warning: 15
  error: 30

function_parameter_count:
  warning: 6
  error: 10

force_try: warning
