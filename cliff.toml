[changelog]
header = """
# Changelog

All notable changes to Wired Client are documented here.
Format follows [Keep a Changelog](https://keepachangelog.com/en/1.0.0/).
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}\
- {{ commit.message | upper_first }} \
([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/nark/Wired-macOS/commit/{{ commit.id }}))\
{% if commit.breaking %} ⚠️ **BREAKING**{% endif %}

{% endfor %}\
{% endfor %}\
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false

commit_preprocessors = [
  { pattern = "(?s)\n.*", replace = "" },
]

commit_parsers = [
  { message = "^feat",                       group = "Features" },
  { message = "^fix",                        group = "Bug Fixes" },
  { message = "^perf",                       group = "Performance" },
  { message = "^refactor",                   group = "Refactoring" },
  { message = "^test",                       group = "Testing" },
  { message = "^docs",                       group = "Documentation" },
  { message = "^ci",                         group = "CI" },
  { message = "^build",                      skip  = true },
  { message = "^chore\\(release\\)",         skip  = true },
  { message = "^chore",                      skip  = true },
  { message = "^style",                      skip  = true },
  { message = "^Add ",                       group = "Features" },
  { message = "^Implement ",                 group = "Features" },
  { message = "^Show ",                      group = "Features" },
  { message = "^Focus ",                     group = "Features" },
  { message = "^Rename packaged app",        group = "Features" },
  { message = "^Fix ",                       group = "Bug Fixes" },
  { message = "^Avoid ",                     group = "Bug Fixes" },
  { message = "^Secure ",                    group = "Bug Fixes" },
  { message = "^Stabilize ",                 group = "Bug Fixes" },
  { message = "^Make ",                      group = "Bug Fixes" },
  { message = "^Remove unsupported",         group = "Bug Fixes" },
  { message = "^Optimize ",                  group = "Performance" },
  { message = "^Refactor ",                  group = "Refactoring" },
  { message = "^Split ",                     group = "Refactoring" },
  { message = "^Improve ",                   group = "Refactoring" },
  { message = "^Rewrite ",                   group = "Documentation" },
  { message = "^Point .*CI",                 group = "CI" },
  { message = "^Select latest Xcode",        group = "CI" },
  { message = "^Use dedicated scheme",       group = "CI" },
  { message = "^Add .*GitHub Actions",       group = "CI" },
  { message = "^Merge ",                     skip  = true },
  { message = ".*",                          group = "Other" },
]

filter_commits = true
tag_pattern = "v[0-9]+\\.[0-9]+.*"
topo_order = false
sort_commits = "newest"

[remote.github]
owner = "nark"
repo = "Wired-macOS"
