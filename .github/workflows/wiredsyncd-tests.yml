name: Unit Tests

on:
  push:
    paths:
      - ".github/workflows/wiredsyncd-tests.yml"
      - "Wired 3/**"
      - "Wired 3Tests/**"
      - "Wired-macOS.xcodeproj/**"
      - "wiredsyncd/**"
  pull_request:
    paths:
      - ".github/workflows/wiredsyncd-tests.yml"
      - "Wired 3/**"
      - "Wired 3Tests/**"
      - "Wired-macOS.xcodeproj/**"
      - "wiredsyncd/**"
  workflow_dispatch:

jobs:
  wired-3-tests:
    name: Wired 3 app tests
    runs-on: macos-14

    steps:
      - name: Checkout Wired-macOS
        uses: actions/checkout@v4
        with:
          path: Wired-macOS

      - name: Checkout WiredSwift
        uses: actions/checkout@v4
        with:
          repository: nark/WiredSwift
          ref: main
          path: WiredSwift

      - name: Select Xcode
        run: |
          latest_xcode="$(find /Applications -maxdepth 1 -type d -name 'Xcode*.app' | sort -V | tail -n 1)"
          if [ -z "${latest_xcode}" ]; then
            echo "No Xcode installation found in /Applications" >&2
            exit 1
          fi
          sudo xcode-select -s "${latest_xcode}/Contents/Developer"
          xcodebuild -version

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run Wired 3 unit tests
        working-directory: Wired-macOS
        run: >
          xcodebuild test
          -project "Wired-macOS.xcodeproj"
          -scheme "Wired 3 Unit Tests"
          -destination "platform=macOS"
          CODE_SIGNING_ALLOWED=NO
          CODE_SIGNING_REQUIRED=NO

  wiredsyncd-tests:
    name: wiredsyncd package tests
    runs-on: macos-14

    steps:
      - name: Checkout Wired-macOS
        uses: actions/checkout@v4
        with:
          path: Wired-macOS

      - name: Checkout WiredSwift
        uses: actions/checkout@v4
        with:
          repository: nark/WiredSwift
          ref: main
          path: WiredSwift

      - name: Select Xcode
        run: |
          latest_xcode="$(find /Applications -maxdepth 1 -type d -name 'Xcode*.app' | sort -V | tail -n 1)"
          if [ -z "${latest_xcode}" ]; then
            echo "No Xcode installation found in /Applications" >&2
            exit 1
          fi
          sudo xcode-select -s "${latest_xcode}/Contents/Developer"
          xcodebuild -version

      - name: Show Swift version
        working-directory: Wired-macOS/wiredsyncd
        run: swift --version

      - name: Run wiredsyncd tests
        working-directory: Wired-macOS/wiredsyncd
        run: swift test
